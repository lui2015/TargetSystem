services:
  target-system:
    build: .
    image: target-system:latest
    container_name: target-system
    restart: unless-stopped
    ports:
      - "8080:4000"
    volumes:
      - ./data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET:-please-change-me-to-a-long-random-string}
      - NODE_ENV=production
